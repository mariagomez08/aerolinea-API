
# --- CONFIGURACIÓN GENERAL ---
# Define el nombre de la aplicación para logs y monitoreo
spring.application.name=Aerolinea

# --- CONEXIÓN A LA BASE DE DATOS (PostgreSQL) ---
# URL de conexión: protocolo, servidor, puerto y nombre de la base de datos
spring.datasource.url=jdbc:postgresql://localhost:5432/aerolineaapi
# Usuario de acceso a la base de datos
spring.datasource.username=postgres
# Contraseña del usuario (escríbela después del signo igual si tienes una)
spring.datasource.password=1234
# Clase del driver específico para comunicarse con PostgreSQL
spring.datasource.driver-class-name=org.postgresql.Driver

# --- CONFIGURACIÓN DE JPA / HIBERNATE ---
# Indica a Hibernate que use el lenguaje (dialecto) específico de Postgres
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
# 'update' sincroniza el modelo de Java con las tablas (crea o modifica, pero no borra)
spring.jpa.hibernate.ddl-auto=update
# Muestra las consultas SQL ejecutadas en la consola de salida
spring.jpa.show-sql=true
# Formatea el SQL en consola para que sea legible y no una sola línea
spring.jpa.properties.hibernate.format_sql=true

